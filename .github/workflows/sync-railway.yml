name: Sync 402.fhe to Railway Repo

on:
  push:
    branches:
      - main
    paths:
      - '402.fhe/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Push 402.fhe subtree to Railway mirror
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync@github.com"

          # extract 402.fhe/ as a standalone branch
          git subtree split --prefix=402.fhe -b subtree-split

          # push that branch as main to the mirror, force so history doesn't conflict
          git push https://jpegwarrior:${{ secrets.RAILWAY_REPO_TOKEN }}@github.com/jpegwarrior/402.fhe.git subtree-split:main --force
